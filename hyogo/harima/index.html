<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=/hyogo/">
  <title>兵庫県ページへ移動します</title>
  <script>location.replace("/hyogo/");</script>
  <link rel="stylesheet" href="/assets/site-mobile.css?v=1">
  <style id="common-kita-before-after-style">
    .common-kita-ba{margin:34px 0;padding:28px;background:#fff;border:1px solid #eadfd0;box-shadow:0 12px 28px rgba(34,28,22,.06)}
    .common-kita-ba .section-title{margin:0 0 18px;padding:0 0 12px;border:0;border-bottom:3px solid #eadfc9;border-radius:0;box-shadow:none;background:transparent;color:#2B2B2B;font-size:24px;line-height:1.45}
    .common-kita-ba .section-title::before{content:"";display:inline-block;width:12px;height:12px;margin-right:9px;background:#D05300;border-radius:2px;vertical-align:middle}
    .common-kita-ba .common-ba-lead{margin:0 0 16px;color:#414743;font-size:16px;line-height:1.85}
    .common-kita-ba .marker{background:linear-gradient(transparent 58%,rgba(255,198,77,.72) 58%);font-weight:900}
    .common-ba-guide{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:16px 0 18px}
    .common-ba-guide span{display:block;padding:11px 13px;background:#fff8ea;border:1px solid #ead8b7;color:#5b4630;font-size:14px;font-weight:900;line-height:1.65}
    .common-ba-slider{position:relative;padding:0 58px}
    .common-ba-track{display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;scrollbar-width:none;padding:2px 0 12px}
    .common-ba-track::-webkit-scrollbar{display:none}
    .common-ba-card{flex:0 0 100%;scroll-snap-align:start;border:1px solid #e5ded5;background:#fff;padding:18px;box-shadow:0 10px 24px rgba(34,28,22,.055)}
    .common-ba-card h3{margin:0 0 14px;padding:10px 12px;background:#fff7df;color:#8c3d00;font-size:18px;line-height:1.45}
    .common-ba-photos{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;position:relative;align-items:stretch;padding:10px;background:#f7f3e7;border:1px solid #eadfd4}
    .common-ba-photos::after{content:"→";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:44px;height:44px;display:grid;place-items:center;border-radius:50%;background:#fff;color:#D05300;border:3px solid #D05300;box-shadow:0 8px 20px rgba(34,28,22,.18);font-size:28px;font-weight:900;z-index:3}
    .common-ba-photo{position:relative;overflow:hidden;margin:0;border:2px solid #d9d1c6;background:#f3f0ea;aspect-ratio:4/3;box-shadow:0 8px 18px rgba(34,28,22,.08)}
    .common-ba-photo img{display:block;width:100%;height:100%;object-fit:cover}
    .common-ba-label{position:absolute;left:0;right:0;top:0;display:grid;place-items:center;min-height:38px;padding:0 12px;background:rgba(126,50,28,.94);color:#fff;font-size:15px;font-weight:900}
    .common-ba-label.after{background:rgba(40,116,90,.96)}
    .common-ba-detail{margin-top:14px;padding:14px 16px;background:#fffdf8;border:1px solid #eadfd4}
    .common-ba-detail p{margin:0 0 8px;color:#464c47;font-size:15px;line-height:1.75}
    .common-ba-detail p:first-child{font-weight:900;color:#333}
    .common-ba-points{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .common-ba-points span{display:inline-grid;place-items:center;min-height:28px;padding:0 10px;background:#eef8f2;border:1px solid #cfe8d8;color:#28745a;font-size:13px;font-weight:900}
    .common-ba-btn{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;display:grid;place-items:center;border:1px solid #dcbf9c;background:#fff;color:#8c3d00;border-radius:50%;box-shadow:0 10px 24px rgba(34,28,22,.18);font-size:28px;font-weight:900;line-height:1;cursor:pointer;z-index:4}
    .common-ba-btn:hover{background:#fff1e6;border-color:#D05300}
    .common-ba-btn[data-common-ba-prev]{left:0}
    .common-ba-btn[data-common-ba-next]{right:0}
    @media(max-width:820px){.common-kita-ba{padding:20px}.common-ba-guide{grid-template-columns:1fr}.common-ba-slider{padding:0 38px}.common-ba-card{padding:12px}.common-ba-photos{grid-template-columns:1fr;gap:10px}.common-ba-photos::after{width:34px;height:34px;font-size:22px;border-width:2px}.common-ba-btn{width:42px;height:42px;font-size:24px}.common-kita-ba .section-title{font-size:21px}}
  </style>
</head>
<body><p><a href="/hyogo/">兵庫県ページへ移動します</a></p><script id="common-kita-before-after-script">
  (() => {
    document.querySelectorAll('[data-common-ba-track]').forEach((track) => {
      if (track.dataset.commonBaReady) return;
      track.dataset.commonBaReady = '1';
      const wrap = track.closest('.common-ba-slider');
      const prev = wrap?.querySelector('[data-common-ba-prev]');
      const next = wrap?.querySelector('[data-common-ba-next]');
      const move = (direction) => {
        const slide = track.querySelector('.common-ba-card');
        const amount = slide ? slide.getBoundingClientRect().width + 18 : track.clientWidth;
        track.scrollBy({ left: direction * amount, behavior: 'smooth' });
      };
      prev?.addEventListener('click', () => move(-1));
      next?.addEventListener('click', () => move(1));
    });
  })();
</script>

</body>
</html>
